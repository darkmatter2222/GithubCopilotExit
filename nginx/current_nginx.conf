# Nginx Ingress Configuration - susman
# Main reverse proxy for the DocuCraft application stack
# App served at /susman/ path

upstream frontend {
    server docucraft-frontend:3000;
}

upstream api {
    server docucraft-api:5000;
}

# Log format (included in http context via conf.d)
# NOTE: nginx base images already define a `log_format main`, so we use a unique name.
log_format gw_main 'time=$time_iso8601 request_id=$request_id '
                'remote=$remote_addr xff="$http_x_forwarded_for" '
                'host=$host method=$request_method uri=$uri status=$status '
                'req_len=$request_length bytes_sent=$bytes_sent '
                'rt=$request_time urt=$upstream_response_time ustatus=$upstream_status '
                'ref="$http_referer" ua="$http_user_agent"';

server {
    listen 80;
    server_name gruntwork.hobbytimewith.me;

    access_log /dev/stdout gw_main;
    error_log /dev/stderr info;

    # Upload limit (controls max file upload size)
    client_max_body_size 1m;

    # ACME challenge (LetsEncrypt)
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/x-javascript application/xml application/json;
}

server {
    listen 443 ssl http2;
    server_name gruntwork.hobbytimewith.me;

    access_log /dev/stdout gw_main;
    error_log /dev/stderr info;

    # Upload limit (controls max file upload size)
    client_max_body_size 1m;

    ssl_certificate /etc/nginx/certs/live/gruntwork.hobbytimewith.me/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/live/gruntwork.hobbytimewith.me/privkey.pem;

    # ACME challenge (LetsEncrypt)
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }
    # Pitch Deck (no auth)
    location /pitch/ {
        proxy_pass http://pitch-deck-upstream/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Redirect root to /susman/
    location = / {
        return 302 /susman/;
    }

    # API routes - proxy to backend (strip /susman prefix)
    # NOTE: Keep global upload limit small, but allow larger uploads for recordings.
    location /susman/api/recordings/ {
        client_max_body_size 50m;
        proxy_request_buffering off;

        rewrite ^/susman/api/(.*)$ /api/$1 break;
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header X-Request-Id $request_id;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300;
    }

    # Template routes (discovery / generation can take several minutes)
    location /susman/api/templates/ {
        rewrite ^/susman/api/(.*)$ /api/$1 break;
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header X-Request-Id $request_id;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 600;
    }

    location /susman/api/ {
        rewrite ^/susman/api/(.*)$ /api/$1 break;
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header X-Request-Id $request_id;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 90;
    }

    # Frontend routes - proxy to React app
    location /susman/ {
        proxy_pass http://frontend/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
# ── Pitch Deck ────────────────────────────────────────────────────────────────
upstream pitch-deck-upstream {
    server 192.168.86.48:8099;
}

# ── Radiological Map Tracker ─────────────────────────────────────────────────
upstream tracker-viewer {
    server 192.168.86.48:8031;
}

upstream tracker-api {
    server 192.168.86.48:8030;
}

# ── GitHub Copilot Dashboard + Inference Proxy ────────────────────────────────
resolver 127.0.0.11 valid=30s;

upstream gcopilot-dash {
    server gcopilot-dashboard:3002;
}

upstream gcopilot-proxy {
    server gcopilot-proxy:8001;
}

# ── IP-based LAN access (http://192.168.86.48/copilot/) ──────────────────────
# Serves dashboard and inference API on the LAN via plain HTTP.
server {
    listen 80;
    listen 443 ssl http2;
    ssl_certificate /etc/nginx/certs/live/susmannet.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/live/susmannet.duckdns.org/privkey.pem;
    server_name 192.168.86.48;

    access_log /dev/stdout gw_main;
    error_log /dev/stderr info;

    # Inference API — direct to DGX Spark (streaming, API key injected)
    # MUST be before /copilot/ so it takes priority (longest prefix match)
    # proxy_read_timeout 600s: 80B model (qwen3-coder-next) cold-starts in ~5min
    location /copilot/v1/ {
        auth_basic off;
        proxy_pass http://gcopilot-proxy/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Streaming / SSE support
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        chunked_transfer_encoding on;
        # Remove any existing Authorization from client (API key is injected above)
    }

    # Proxy health (public)
    location = /copilot/health {
        auth_basic off;
        proxy_pass http://gcopilot-proxy/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Dashboard — proxy to serve.py (handles its own auth)
    location /copilot/ {
        auth_basic off;
        proxy_pass http://gcopilot-dash/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Redirect bare root → /copilot/
    location = / {
        return 301 /copilot/;
    }
}

server {
    listen 80;
    server_name susmannet.duckdns.org;

    access_log /dev/stdout gw_main;
    error_log /dev/stderr info;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name susmannet.duckdns.org;

    access_log /dev/stdout gw_main;
    error_log /dev/stderr info;

    client_max_body_size 50m;

    ssl_certificate /etc/nginx/certs/live/susmannet.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/live/susmannet.duckdns.org/privkey.pem;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Pitch Deck — static HTML presentation, no auth required
    location /pitch/ {
        auth_basic off;
        proxy_pass http://pitch-deck-upstream/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # HTTP Basic Auth guards the tracker domain.
    auth_basic "Radiological Map";
    auth_basic_user_file /etc/nginx/tracker_htpasswd;

    # Redirect bare root to /tracker/
    location = / {
        return 302 https://$host/tracker/;
    }

    # Ingest API
    location /api/ {
        proxy_pass http://tracker-api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120;
    }

    # Radiological Map Viewer
    location /tracker/ {
        proxy_pass http://tracker-viewer/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── GitHub Copilot Inference API (direct to DGX Spark, streaming) ─────────
    # Must be before /copilot/ so longest-prefix wins for /v1/ requests
    # proxy_read_timeout 600s: 80B model (qwen3-coder-next) cold-starts in ~5min
    location /copilot/v1/ {
        auth_basic off;
        proxy_pass http://gcopilot-proxy/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Streaming / SSE support — critical for token-by-token output
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        chunked_transfer_encoding on;
    }

    # Proxy health (public, no auth)
    location = /copilot/health {
        auth_basic off;
        proxy_pass http://gcopilot-proxy/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # GitHub Copilot Dashboard — proxy to serve.py (handles session auth)
    location /copilot/ {
        auth_basic off;
        proxy_pass http://gcopilot-dash/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

