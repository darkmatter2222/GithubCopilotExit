# HTTP -> HTTPS redirect for copilot domain
server {
    listen 80;
    server_name copilot.hobbytimewith.me;

    access_log /dev/stdout gw_main;
    error_log /dev/stderr info;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
